knpu_oauth2_client:
    clients:
        google:
            type: google
            client_id: '%env(GOOGLE_CLIENT_ID)%'
            client_secret: '%env(GOOGLE_CLIENT_SECRET)%'
            redirect_route: google_auth_check
            redirect_params: []
            use_oidc_mode: true
            
        linkedin:
            type: linkedin
            client_id: '%env(LINKEDIN_CLIENT_ID)%'
            client_secret: '%env(LINKEDIN_CLIENT_SECRET)%'
            redirect_route: linkedin_auth_check
            redirect_params: []
            fields: ['id', 'firstName', 'lastName', 'profilePicture', 'email']